# Development Environment Configuration
# This file contains settings specific to the development environment
# It will be merged with config.yaml when ENV_FOR_DYNACONF=development

api:
  debug: true
  host: "127.0.0.1"

cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:3001"

database:
  url: "sqlite:///./dev_app.db"
  echo: true  # Log all SQL statements in development

logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(funcName)s:%(lineno)d - %(message)s"

features:
  enable_request_logging: true
  enable_metrics: true

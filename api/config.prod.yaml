# Production Configuration Overrides
# This file extends config.yaml with production-specific settings

api:
  debug: false
  host: "0.0.0.0"
  port: 8000

cors:
  allow_origins:
    - "https://your-frontend-domain.com"
    - "https://api.your-domain.com"

database:
  url: "postgresql://user:password@localhost/production_db"
  echo: false
  pool_size: 20
  max_overflow: 30

logging:
  level: "WARNING"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/jstc-api/app.log"

security:
  access_token_expire_minutes: 15  # Shorter expiry for production

features:
  enable_rate_limiting: true
  enable_request_logging: false
  enable_metrics: true

# Docker Compose for Development
# Simplified setup for development with auto-reload

version: '3.8'

services:
  # FastAPI application (development mode)
  api:
    build: .
    container_name: jstc-api-dev
    ports:
      - "8000:8000"
    environment:
      - ENV_FOR_DYNACONF=development
      - JSTC_SECRET_KEY=dev-secret-key
      - JSTC_API__DEBUG=true
    volumes:
      # Mount source code for hot reload
      - .:/app
    networks:
      - jstc-dev-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL database for development
  db:
    image: postgres:15-alpine
    container_name: jstc-db-dev
    environment:
      POSTGRES_DB: jstc_dev_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - jstc-dev-network
    restart: unless-stopped

# Networks
networks:
  jstc-dev-network:
    driver: bridge

# Volumes
volumes:
  postgres_dev_data:
    driver: local

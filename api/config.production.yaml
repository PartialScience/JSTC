# Production Environment Configuration
# This file contains settings specific to the production environment
# It will be merged with config.yaml when ENV_FOR_DYNACONF=production

api:
  debug: false
  host: "0.0.0.0"

cors:
  allow_origins:
    - "https://your-frontend-domain.com"
    - "https://api.your-domain.com"

database:
  url: "postgresql://user:password@prod-db/production_app"
  echo: false
  pool_size: 20
  max_overflow: 30

logging:
  level: "WARNING"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/jstc-api/app.log"

security:
  access_token_expire_minutes: 15  # Shorter expiry for production

features:
  enable_rate_limiting: true
  enable_request_logging: false  # Disable in prod for performance
  enable_metrics: true
